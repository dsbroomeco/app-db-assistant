name: PR Check

on:
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    lint-and-typecheck:
        name: Lint & Typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npx tsc --noEmit

    unit-tests:
        name: Unit Tests (${{ matrix.os }})
        needs: lint-and-typecheck
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - windows-latest
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npx vitest run

    e2e-tests:
        name: E2E Tests
        needs: lint-and-typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - name: Run e2e tests
              run: npx playwright test
              continue-on-error: true # remove once e2e suite is stable

    website-build:
        name: Website Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: cd website && npm ci
            - run: cd website && npm run lint
            - run: cd website && npm run build:static
