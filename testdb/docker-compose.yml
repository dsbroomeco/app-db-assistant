# Test Database Instances — DB Assistant development only
#
# ⚠️  DO NOT commit this folder to the public open-source repo.
#     See ROADMAP.md for the pre-launch removal checklist item.
#
# Spins up a PostgreSQL 16 and MySQL 8 instance pre-seeded with
# representative sample data for manually testing DB Assistant features.
#
# Usage:
#   cd testdb
#   docker compose up -d          # Start both databases
#   docker compose down           # Stop (data is preserved in volumes)
#   docker compose down -v        # Stop and DELETE all data (reset)
#   docker compose logs -f        # Tail logs
#
# Connection details:
#   PostgreSQL  host=localhost  port=5433  user=dbadmin  password=testpass  database=sampledb
#   MySQL       host=localhost  port=3307  user=dbadmin  password=testpass  database=sampledb

services:
  postgres:
    image: postgres:16-alpine
    container_name: dba_test_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: sampledb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seed/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dbadmin -d sampledb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: dba_test_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: dbadmin
      MYSQL_PASSWORD: testpass
      MYSQL_DATABASE: sampledb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./seed/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "dbadmin",
          "--password=testpass",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

volumes:
  postgres_data:
  mysql_data:
